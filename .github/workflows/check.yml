name: Costco Tire Check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: seen.json
          key: seen-state-${{ github.run_id }}
          restore-keys: |
            seen-state-

      - name: Run check
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python check.py

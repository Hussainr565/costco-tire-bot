name: Moraine Lake Shuttle Check

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: shuttle_seen.json
          key: shuttle-state-${{ github.run_id }}
          restore-keys: |
            shuttle-state-

      - name: Run check
        env:
          SHUTTLE_WEBHOOK: ${{ secrets.SHUTTLE_WEBHOOK }}
        run: python shuttle_check.py
